<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login e Registro - FixIt</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
    <h2>Login</h2>
    <form id="loginForm">
        <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input type="email" class="form-control" id="email" placeholder="Digite seu e-mail" required>
        </div>
        <div class="mb-3">
            <label for="senha" class="form-label">Senha</label>
            <input type="password" class="form-control" id="senha" placeholder="Digite sua senha" required>
        </div>
        <button type="submit" class="btn btn-primary">Entrar</button>
    </form>

    <hr>

    <h2>Criar Conta</h2>
    <form id="registerForm">
        <div class="mb-3">
            <label for="newEmail" class="form-label">Email</label>
            <input type="email" class="form-control" id="newEmail" placeholder="Digite seu e-mail" required>
        </div>
        <div class="mb-3">
            <label for="newSenha" class="form-label">Senha</label>
            <input type="password" class="form-control" id="newSenha" placeholder="Digite sua senha" required>
        </div>
        <button type="submit" class="btn btn-success">Criar Conta</button>
    </form>
</div>

<script>
    // Função de login
    document.getElementById("loginForm").addEventListener("submit", function (event) {
        event.preventDefault();

        const email = document.getElementById("email").value;
        const senha = document.getElementById("senha").value;

        fetch('/usuarios/login?email=' + email + '&senha=' + senha, {
            method: 'POST'
        })
        .then(response => {
            if (response.status === 200) {
                alert("Login bem-sucedido!");
            } else {
                alert("Credenciais inválidas.");
            }
        })
        .catch(error => {
            alert("Erro ao tentar fazer login.");
            console.error("Erro:", error);
        });
    });

    // Função de registro
    document.getElementById("registerForm").addEventListener("submit", function (event) {
        event.preventDefault();

        const email = document.getElementById("newEmail").value;
        const senha = document.getElementById("newSenha").value;

        const usuario = {
            email: email,
            senha: senha,
            nome: "Novo Usuário",
            cargo: "Usuário"
        };

        fetch('/usuarios', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(usuario)
        })
        .then(response => {
            if (response.status === 201) {
                alert("Conta criada com sucesso!");
            } else {
                alert("Erro ao criar a conta.");
            }
        })
        .catch(error => {
            alert("Erro ao tentar criar conta.");
            console.error("Erro:", error);
        });
    });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
